
name = "nightmare-library"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = "./"

# ============================================
# D1 Database Binding
# ============================================
# Run: npx wrangler d1 create nightmare-library-db
# Then copy the database_id from output and paste below
[[d1_databases]]
binding = "DB"
database_name = "nightmare-library-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ============================================
# KV Namespace Bindings
# ============================================
# Run these commands to create KV namespaces:
# npx wrangler kv:namespace create "KV_SESSIONS"
# npx wrangler kv:namespace create "KV_CACHE"
# npx wrangler kv:namespace create "KV_RATE_LIMIT"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "REPLACE_WITH_YOUR_KV_SESSIONS_ID"
preview_id = "REPLACE_WITH_YOUR_KV_SESSIONS_PREVIEW_ID"

[[kv_namespaces]]
binding = "KV_CACHE"
id = "REPLACE_WITH_YOUR_KV_CACHE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_CACHE_PREVIEW_ID"

[[kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = "REPLACE_WITH_YOUR_KV_RATE_LIMIT_ID"
preview_id = "REPLACE_WITH_YOUR_KV_RATE_LIMIT_PREVIEW_ID"

# ============================================
# Environment Variables (non-secret)
# ============================================
[vars]
ENVIRONMENT = "production"

# ============================================
# SECRETS CONFIGURATION (10 Storage Providers)
# ============================================
# DO NOT commit secrets to version control!
# Set in Cloudflare Dashboard: Pages > nightmare-library > Settings > Environment variables
#
# CLI method: npx wrangler secret put SECRET_NAME
#
# REQUIRED SECRETS:
# -----------------
# PASSWORD          - Your login password (min 8 chars)
# JWT_SECRET        - Random 64-char string (openssl rand -hex 32)
#
# ============================================
# STORAGE PROVIDERS (Cascading Fallback Order)
# ============================================
# The system tries providers in this order until one succeeds.
# Configure at least ONE provider. GitHub is recommended as fallback.
#
# 1. GOOGLE DRIVE (15GB free)
# ---------------------------
# GDRIVE_ACCESS_TOKEN - OAuth2 access token from Google Cloud Console
# GDRIVE_FOLDER_ID    - (Optional) Specific folder ID
#
# 2. DROPBOX (2GB free, can earn more)
# ------------------------------------
# DROPBOX_ACCESS_TOKEN - Access token from Dropbox App Console
# DROPBOX_PATH         - (Optional) Path like "/NightmareLibrary"
#
# 3. ONEDRIVE (5GB free)
# ----------------------
# ONEDRIVE_ACCESS_TOKEN - OAuth2 token from Microsoft Graph
# ONEDRIVE_FOLDER_ID    - (Optional) Folder ID for storage
#
# 4. PCLOUD (10GB free)
# ---------------------
# PCLOUD_ACCESS_TOKEN - Access token from pCloud OAuth
# PCLOUD_FOLDER_ID    - (Optional) Folder ID, default is root
#
# 5. BOX (10GB free)
# ------------------
# BOX_ACCESS_TOKEN - Access token from Box Developer Console
# BOX_FOLDER_ID    - (Optional) Folder ID for books
#
# 6. YANDEX DISK (10GB free)
# --------------------------
# YANDEX_ACCESS_TOKEN - OAuth token from Yandex OAuth
# YANDEX_PATH         - (Optional) Path like "NightmareLibrary"
#
# 7. KOOFR (10GB free)
# --------------------
# KOOFR_ACCESS_TOKEN - OAuth2 token from Koofr
# KOOFR_MOUNT_ID     - (Optional) Mount ID, default "primary"
# KOOFR_PATH         - (Optional) Path for storage
#
# 8. BACKBLAZE B2 (10GB free)
# ---------------------------
# B2_KEY_ID         - Application Key ID from B2 Console
# B2_APPLICATION_KEY - Application Key
# B2_BUCKET_ID      - Bucket ID to store files
# B2_BUCKET_NAME    - Bucket name for download URLs
#
# 9. MEGA.NZ (20GB free, ONE account only)
# ----------------------------------------
# MEGA_EMAIL     - Your Mega.nz email
# MEGA_PASSWORD  - Your Mega.nz password
# MEGA_FOLDER_ID - (Optional) Folder ID
#
# 10. GITHUB (4GB repository limit - FINAL FALLBACK)
# --------------------------------------------------
# GITHUB_TOKEN - Personal Access Token with repo scope
# GITHUB_OWNER - Your GitHub username
# GITHUB_REPO  - (Optional) defaults to "nightmare-library-storage"
#
# SECURITY NOTES:
# ---------------
# - Never commit actual secret values
# - Rotate secrets periodically
# - Use least-privilege access tokens
# - Monitor access logs for suspicious activity
#
# For detailed setup instructions, see: CLOUDFLARE_SETUP.md
