
name = "nightmare-library"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = "./"

# ============================================
# D1 Database Binding
# ============================================
# Configure these in Cloudflare Pages Settings:
# Pages > nightmare-library > Settings > Functions > D1 database bindings
#
# You need 10 databases: nightmare-library-db-1 through nightmare-library-db-10
[[d1_databases]]
binding = "DB_1"
database_name = "nightmare-library-db-1"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ============================================
# KV Namespace Bindings
# ============================================
# Configure these in Cloudflare Pages Settings:
# Pages > nightmare-library > Settings > Functions > KV namespace bindings
#
# You need 3 KV namespaces: KV_SESSIONS, KV_CACHE, KV_RATE_LIMIT
[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "REPLACE_WITH_YOUR_KV_SESSIONS_ID"
preview_id = "REPLACE_WITH_YOUR_KV_SESSIONS_PREVIEW_ID"

[[kv_namespaces]]
binding = "KV_CACHE"
id = "REPLACE_WITH_YOUR_KV_CACHE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_CACHE_PREVIEW_ID"

[[kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = "REPLACE_WITH_YOUR_KV_RATE_LIMIT_ID"
preview_id = "REPLACE_WITH_YOUR_KV_RATE_LIMIT_PREVIEW_ID"

# ============================================
# Environment Variables (non-secret)
# ============================================
[vars]
ENVIRONMENT = "production"

# ============================================
# SECRETS CONFIGURATION
# ============================================
# DO NOT put actual secret values here!
# DO NOT commit secrets to version control!
#
# Set all secrets in Cloudflare Pages Dashboard:
# Pages > nightmare-library > Settings > Environment variables
#
# Required secrets:
#   PASSWORD       - Your login password (min 8 chars)
#   JWT_SECRET     - Random 64-char string: openssl rand -hex 32
#
# Storage provider secrets (set at least GITHUB_TOKEN):
#   GDRIVE_ACCESS_TOKEN, GDRIVE_FOLDER_ID
#   DROPBOX_ACCESS_TOKEN, DROPBOX_PATH
#   ONEDRIVE_ACCESS_TOKEN, ONEDRIVE_FOLDER_ID
#   PCLOUD_ACCESS_TOKEN, PCLOUD_FOLDER_ID
#   BOX_ACCESS_TOKEN, BOX_FOLDER_ID
#   YANDEX_ACCESS_TOKEN, YANDEX_PATH
#   KOOFR_ACCESS_TOKEN, KOOFR_MOUNT_ID, KOOFR_PATH
#   B2_KEY_ID, B2_APPLICATION_KEY, B2_BUCKET_ID, B2_BUCKET_NAME
#   MEGA_EMAIL, MEGA_PASSWORD, MEGA_FOLDER_ID
#   GITHUB_TOKEN, GITHUB_OWNER, GITHUB_REPO
#
# See CLOUDFLARE_SETUP.md for detailed instructions on obtaining each secret.
