name = "nightmare-library"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = "./"

# D1 Database Binding
# After running: npx wrangler d1 create nightmare-library-db
# Copy the database_id from the output and paste below
[[d1_databases]]
binding = "DB"
database_name = "nightmare-library-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# KV Namespace Bindings
# After running: npx wrangler kv:namespace create "KV_SESSIONS"
# Copy the id from the output and paste below
[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "REPLACE_WITH_YOUR_KV_SESSIONS_ID"

# After running: npx wrangler kv:namespace create "KV_CACHE"
[[kv_namespaces]]
binding = "KV_CACHE"
id = "REPLACE_WITH_YOUR_KV_CACHE_ID"

# Environment Variables (non-secret)
[vars]
ENVIRONMENT = "production"

# ============================================
# SECRETS - Set these in Cloudflare Dashboard
# ============================================
# Go to: Cloudflare Dashboard > Pages > nightmare-library > Settings > Environment variables
# Or use CLI: npx wrangler secret put SECRET_NAME
#
# REQUIRED SECRETS:
# -----------------
# PASSWORD          = "YourSecurePassword123!"     (your login password)
# JWT_SECRET        = "random-64-character-string" (generate with password manager)
#
# STORAGE SECRETS (cascading fallback - configure at least one):
# ---------------------------------------------------------------
# Google Drive (Primary):
# GDRIVE_ACCESS_TOKEN   = "ya29.xxxxx"            (OAuth2 access token)
# GDRIVE_FOLDER_ID      = "1ABC...XYZ"            (optional folder ID)
#
# Dropbox (Secondary):
# DROPBOX_ACCESS_TOKEN  = "sl.xxxxx"              (app access token)
# DROPBOX_PATH          = "/NightmareLibrary"     (optional base path)
#
# Mega.nz (Tertiary):
# MEGA_EMAIL            = "your@email.com"        (Mega.nz account email)
# MEGA_PASSWORD         = "yourpassword"          (Mega.nz password)
# MEGA_FOLDER_ID        = "xxxxx"                 (optional folder ID)
#
# GitHub (Final Fallback - 4GB max, private repo):
# GITHUB_TOKEN          = "ghp_xxxxxxxxxxxx"      (Personal Access Token with repo scope)
# GITHUB_OWNER          = "your-username"         (GitHub username)
# GITHUB_REPO           = "nightmare-library-storage" (optional custom repo name)
#
# See CLOUDFLARE_SETUP.md for step-by-step instructions
