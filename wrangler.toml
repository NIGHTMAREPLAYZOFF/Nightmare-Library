name = "nightmare-library"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# All secrets are set via Cloudflare Dashboard → Pages → Settings → Environment Variables
# Do NOT put secret values here. This file is safe to commit.

# ── KV Namespaces ──────────────────────────────────────────────────────────────
# Create these in the Cloudflare Dashboard → KV, then bind them in Pages Settings → Functions
# [[kv_namespaces]]
# binding = "KV_SESSIONS"
# id = "YOUR_KV_SESSIONS_ID"
#
# [[kv_namespaces]]
# binding = "KV_RATE_LIMIT"
# id = "YOUR_KV_RATE_LIMIT_ID"
#
# [[kv_namespaces]]
# binding = "KV_CACHE"
# id = "YOUR_KV_CACHE_ID"

# ── D1 Databases (10 shards) ───────────────────────────────────────────────────
# Create these in Cloudflare Dashboard → D1, then bind in Pages Settings → Functions
# [[d1_databases]]
# binding = "DB_1"
# database_name = "db-1"
# database_id = "YOUR_DB_1_ID"
#
# [[d1_databases]]
# binding = "DB_2"
# database_name = "db-2"
# database_id = "YOUR_DB_2_ID"
#
# (Repeat for DB_3 through DB_10)

# ── Environment Variables (non-secret) ────────────────────────────────────────
[vars]
ENVIRONMENT = "production"

# ── Required Dashboard Secrets (set as encrypted secrets, NOT here) ───────────
# PASSWORD          — Library login password
# JWT_SECRET        — Long random string for session signing
# GITHUB_TOKEN      — GitHub Personal Access Token for storage
# GITHUB_OWNER      — GitHub username/org for storage repos
# GITHUB_REPO       — Primary storage repo name (default: nightmare-library-storage)
# GDRIVE_ACCESS_TOKEN
# DROPBOX_ACCESS_TOKEN
# ONEDRIVE_ACCESS_TOKEN
# PCLOUD_ACCESS_TOKEN
# BOX_ACCESS_TOKEN
# YANDEX_ACCESS_TOKEN
# KOOFR_ACCESS_TOKEN
# B2_KEY_ID
# B2_APPLICATION_KEY
# B2_BUCKET_ID
# B2_BUCKET_NAME
# MEGA_EMAIL
# MEGA_PASSWORD
# MEGA_FOLDER_ID
