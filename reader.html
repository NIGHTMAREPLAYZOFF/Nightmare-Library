<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightmare Library - Reader</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/reader.css">
</head>
<body class="reader-body">
    <div class="reader-toolbar" id="reader-toolbar">
        <div class="toolbar-left">
            <button class="btn-icon" id="back-btn" title="Back to Library">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"/>
                    <polyline points="12 19 5 12 12 5"/>
                </svg>
            </button>
            <div class="book-title-bar">
                <span id="book-title">Loading...</span>
            </div>
        </div>
        <div class="toolbar-right">
            <button class="btn-icon" id="font-decrease-btn" title="Decrease Font Size">A-</button>
            <button class="btn-icon" id="font-increase-btn" title="Increase Font Size">A+</button>
            <button class="btn-icon" id="reader-theme-btn" title="Toggle Theme">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
            <button class="btn-icon" id="fullscreen-btn" title="Fullscreen">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                    <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="reader-container" id="reader-container">
        <div class="reader-loading" id="reader-loading">
            <div class="spinner"></div>
            <p>Loading book...</p>
        </div>
        <iframe id="reader-frame" class="reader-frame hidden" title="Book Reader" sandbox="allow-same-origin allow-scripts"></iframe>
        <div id="pdf-container" class="pdf-container hidden"></div>
    </div>

    <div class="reader-footer" id="reader-footer">
        <button class="btn-icon" id="prev-page-btn" title="Previous Page">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="page-info">
            <span id="current-page">1</span> / <span id="total-pages">?</span>
        </div>
        <button class="btn-icon" id="next-page-btn" title="Next Page">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    </div>

    <script src="/js/reader.js"></script>
</body>
</html>
